<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Apex — Track Designer</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css" />
<style>
  :root {
    --bg: #11141c; --panel: rgba(17, 20, 28, 0.88); --line: #2a2f3d;
    --text: #e8eaf0; --dim: #9aa3b5; --red: #e10600; --gold: #ffd24d;
    --ok: #3ddc84; --bad: #ff5252;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font: 14px/1.45 "Segoe UI", system-ui, sans-serif;
    background: var(--bg); color: var(--text);
  }
  #map { position: absolute; inset: 0; }

  /* ---- top bar ---- */
  #topbar {
    position: absolute; top: 0; left: 0; right: 0; height: 52px; z-index: 20;
    display: flex; align-items: center; gap: 10px; padding: 0 14px;
    background: var(--panel); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
  }
  #brand { font-weight: 800; font-style: italic; letter-spacing: 0.5px; font-size: 17px; white-space: nowrap; }
  #brand b { color: var(--red); }
  #trackName {
    background: transparent; border: 1px solid transparent; color: var(--gold);
    font: italic 600 15px "Segoe UI", system-ui; padding: 4px 8px; border-radius: 6px;
    width: 200px;
  }
  #trackName:hover, #trackName:focus { border-color: var(--line); outline: none; background: #00000040; }
  #searchWrap { position: relative; flex: 1; max-width: 340px; }
  #search {
    width: 100%; padding: 7px 12px; border-radius: 8px; border: 1px solid var(--line);
    background: #00000055; color: var(--text); outline: none;
  }
  #searchResults {
    position: absolute; top: 38px; left: 0; right: 0; background: var(--panel);
    border: 1px solid var(--line); border-radius: 8px; overflow: hidden; display: none;
  }
  #searchResults div { padding: 8px 12px; cursor: pointer; font-size: 13px; }
  #searchResults div:hover { background: #ffffff14; }
  .spacer { flex: 1; }
  button {
    background: #ffffff10; border: 1px solid var(--line); color: var(--text);
    padding: 7px 13px; border-radius: 8px; cursor: pointer; font: 600 13px "Segoe UI", system-ui;
  }
  button:hover { background: #ffffff22; }
  button.primary { background: var(--red); border-color: var(--red); }
  button.primary:hover { background: #ff1e18; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ---- left toolbar ---- */
  #toolbar {
    position: absolute; top: 66px; left: 14px; z-index: 20;
    display: flex; flex-direction: column; gap: 6px; width: 152px;
    background: var(--panel); backdrop-filter: blur(8px);
    border: 1px solid var(--line); border-radius: 12px; padding: 10px;
  }
  #toolbar .label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin: 4px 2px 2px; }
  #toolbar button { text-align: left; padding: 8px 10px; }
  #toolbar button.active { background: var(--red); border-color: var(--red); }

  /* ---- right panel ---- */
  #panel {
    position: absolute; top: 66px; right: 14px; bottom: 14px; width: 300px; z-index: 20;
    background: var(--panel); backdrop-filter: blur(8px);
    border: 1px solid var(--line); border-radius: 12px; padding: 14px;
    overflow-y: auto;
  }
  #panel h3 {
    font-size: 11px; color: var(--dim); text-transform: uppercase;
    letter-spacing: 1.2px; margin: 14px 0 8px; border-bottom: 1px solid var(--line); padding-bottom: 5px;
  }
  #panel h3:first-child { margin-top: 0; }
  .stat { display: flex; justify-content: space-between; padding: 3px 0; font-size: 13px; }
  .stat .v { color: var(--gold); font-weight: 600; font-variant-numeric: tabular-nums; }
  .check { display: flex; gap: 8px; padding: 4px 0; font-size: 13px; align-items: baseline; }
  .check .ic { width: 16px; flex: none; }
  .check.ok .ic { color: var(--ok); }
  .check.bad .ic { color: var(--bad); }
  .check .val { margin-left: auto; color: var(--dim); font-size: 12px; white-space: nowrap; }
  #widthRow { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 13px; }
  #widthRow input { flex: 1; accent-color: var(--red); }
  .turnRow { display: flex; gap: 8px; align-items: center; padding: 3px 0; }
  .turnRow .tno { width: 34px; font-weight: 700; color: var(--gold); font-size: 12px; }
  .turnRow .tdir { width: 14px; color: var(--dim); font-size: 12px; }
  .turnRow input {
    flex: 1; background: #00000040; border: 1px solid var(--line); border-radius: 6px;
    color: var(--text); padding: 4px 8px; font-size: 12px;
  }
  .turnRow .trad { color: var(--dim); font-size: 11px; width: 42px; text-align: right; }
  select {
    width: 100%; background: #1a1e2a; border: 1px solid var(--line); color: var(--text);
    padding: 7px 10px; border-radius: 8px; font-size: 13px;
  }
  .hint { color: var(--dim); font-size: 12px; padding: 6px 0; }

  /* ---- drive overlay ---- */
  #drive { position: absolute; inset: 0; z-index: 50; display: none; background: #000; }
  #drive.on { display: block; }
  #driveCanvas { width: 100%; height: 100%; display: block; }
  .hud { position: absolute; color: #fff; text-shadow: 0 2px 8px #000c; user-select: none; }
  #hudSpeedWrap { bottom: 34px; left: 50%; transform: translateX(-50%); text-align: center; }
  #hudSpeed { font: italic 800 64px "Segoe UI", system-ui; line-height: 1; }
  #hudSpeedWrap small { font-size: 13px; color: #ffffffaa; letter-spacing: 2px; }
  #hudGear {
    position: absolute; left: -64px; top: 6px; font: italic 800 42px "Segoe UI";
    color: var(--gold);
  }
  #hudTimeWrap { top: 20px; left: 50%; transform: translateX(-50%); text-align: center; }
  #hudTime { font: 700 30px "Consolas", monospace; }
  #hudTimeWrap .sub { font: 600 13px "Consolas", monospace; color: #ffffffbb; display: flex; gap: 18px; justify-content: center; }
  #hudLap { top: 20px; left: 22px; font: italic 800 22px "Segoe UI"; }
  #hudTurn {
    top: 36%; left: 50%; transform: translateX(-50%);
    font: italic 800 30px "Segoe UI"; color: var(--gold); opacity: 0; transition: opacity 0.2s;
  }
  #hudMsg { top: 46%; left: 50%; transform: translateX(-50%); font: italic 800 26px "Segoe UI"; color: var(--bad); }
  #minimap { position: absolute; right: 22px; bottom: 22px; opacity: 0.95; }
  #hudHelp { bottom: 18px; left: 22px; font-size: 12px; color: #ffffff99; }
  #hudExit { top: 18px; right: 22px; }
  #loading {
    position: absolute; inset: 0; display: none; place-items: center; z-index: 60;
    background: #000c; color: #fff; font: italic 700 22px "Segoe UI";
  }
  #loading.on { display: grid; }
</style>
</head>
<body>
  <div id="map"></div>

  <div id="topbar">
    <div id="brand">APEX<b>/</b>DESIGNER</div>
    <input id="trackName" value="Untitled Circuit" spellcheck="false" />
    <div id="searchWrap">
      <input id="search" placeholder="Search a place… (Enter)" />
      <div id="searchResults"></div>
    </div>
    <div class="spacer"></div>
    <button id="btnNew">New</button>
    <button id="btnImport">Import</button>
    <button id="btnExport">Export</button>
    <button id="btnDrive" class="primary">🏁 DRIVE</button>
  </div>

  <div id="toolbar">
    <div class="label">Tools</div>
    <button data-mode="view" class="active">🧭 Explore</button>
    <button data-mode="track">✏️ Draw Track</button>
    <button data-mode="pit">🅿️ Pit Lane</button>
    <button data-mode="start">🏁 Start / Finish</button>
    <button data-mode="stand">🏟️ Grandstand</button>
    <div class="label">Actions</div>
    <button id="btnClose">✅ Close Loop</button>
    <button id="btnUndo">↩️ Undo</button>
    <button id="btnClear">🗑️ Clear All</button>
  </div>

  <div id="panel">
    <h3>Circuit</h3>
    <div id="stats"></div>
    <div id="widthRow">
      <span>Width</span>
      <input id="width" type="range" min="8" max="25" step="0.5" value="13" />
      <span class="v" id="widthVal">13 m</span>
    </div>

    <h3>Homologation</h3>
    <select id="preset">
      <option value="f1">F1 — FIA Grade 1</option>
      <option value="gt">GT — FIA Grade 2</option>
      <option value="club">Club Circuit</option>
    </select>
    <div id="checks" style="margin-top:8px"></div>

    <h3>Turns</h3>
    <div id="turns" class="hint">Close the loop to auto-detect corners.</div>
  </div>

  <div id="drive">
    <canvas id="driveCanvas"></canvas>
    <div class="hud" id="hudLap">LAP 1</div>
    <div class="hud" id="hudTimeWrap">
      <div id="hudTime">--:--.---</div>
      <div class="sub"><span id="hudLast">LAST --:--.---</span><span id="hudBest">BEST --:--.---</span></div>
    </div>
    <div class="hud" id="hudTurn"></div>
    <div class="hud" id="hudMsg"></div>
    <div class="hud" id="hudSpeedWrap">
      <div id="hudGear">1</div>
      <div id="hudSpeed">0</div><small>KM/H</small>
    </div>
    <canvas class="hud" id="minimap" width="190" height="190"></canvas>
    <div class="hud" id="hudHelp">W/S throttle · brake — A/D steer — R respawn — ESC exit</div>
    <button class="hud" id="hudExit">✕ Exit (Esc)</button>
  </div>
  <div id="loading">Building circuit…</div>

  <input type="file" id="fileInput" accept=".json" style="display:none" />

  <script>
    // Test hook: with ?bg=1, keep rendering even when the tab is hidden
    // (rAF doesn't fire in background tabs, which stalls MapLibre/Three).
    if (location.search.includes('bg=1')) {
      // setTimeout is clamped to 1 Hz in hidden tabs; MessageChannel is not.
      const nativeRaf = window.requestAnimationFrame.bind(window);
      const chan = new MessageChannel();
      const pending = new Map();
      let nextId = 1;
      let lastTick = 0;
      chan.port1.onmessage = () => {
        // Pace to ~60 fps without timers by re-posting until enough time passes.
        if (performance.now() - lastTick < 16) {
          if (pending.size) chan.port2.postMessage(0);
          return;
        }
        lastTick = performance.now();
        const cbs = [...pending.values()];
        pending.clear();
        cbs.forEach((cb) => cb(performance.now()));
      };
      window.requestAnimationFrame = (cb) => {
        if (!document.hidden) return nativeRaf(cb);
        const id = nextId++;
        pending.set(id, cb);
        chan.port2.postMessage(0);
        return id;
      };
      window.cancelAnimationFrame = (id) => { pending.delete(id); };
    }
  </script>
  <script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
